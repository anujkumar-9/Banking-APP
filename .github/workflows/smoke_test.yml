name: Smoke Testing For Infra and Networking

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::499989195637:role/git-action-deploy-role
          aws-region: us-east-1

      - name: List repository files
        run: ls -la

      - name: Upload smoke_test.py to S3
        run: |
          aws s3 cp smoke_test.py \
            s3://499989195637-devops-scripts/smoke_test.py \
            --region us-east-1

      - name: Run Smoke Test on Fleet
        id: smoke
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands":[
                "aws s3 cp s3://499989195637-devops-scripts/smoke_test.py /tmp/smoke_test.py",
                "python3 /tmp/smoke_test.py",
                "rm -f /tmp/smoke_test.py"
              ]
            }' \
            --query 'Command.CommandId' \
            --output text \
            --region us-east-1)

          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT

      - name: Show Results
        run: |
          sleep 30

          aws ssm list-command-invocations \
            --command-id "${{ steps.smoke.outputs.cmd_id }}" \
            --details \
            --query "CommandInvocations[*].{Instance:InstanceId,Status:Status,Output:CommandPlugins[0].Output}" \
            --output table \
            --region us-east-1

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{ steps.smoke.outputs.cmd_id }}" \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region us-east-1)

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED instance(s) failed the smoke test."
            exit 1
          fi

          echo "Smoke Test Passed ✅"
          

      