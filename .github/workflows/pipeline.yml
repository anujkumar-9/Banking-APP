name: Main Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  verify_connection:
    uses: ./.github/workflows/test_connection.yml
    permissions:
      id-token: write
      contents: read

  test_fleet_health_envs:
    needs: verify_connection
    uses: ./.github/workflows/test_fleet_health.yml
    permissions:
      id-token: write
      contents: read

  smoke_test:
    needs: verify_connection
    uses: ./.github/workflows/smoke_test.yml
    permissions:
      id-token: write
      contents: read

  deploy_test:
    needs:
      - verify_connection
      - test_fleet_health_envs
      - smoke_test
    uses: ./.github/workflows/deploy.yml
    permissions:
      id-token: write
      contents: read
