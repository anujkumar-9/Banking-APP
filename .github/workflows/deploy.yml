name: Deploy SimpleBank

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  VERSION: v1.0.0
  REGION: us-east-1
  ECR: 499989195637.dkr.ecr.us-east-1.amazonaws.com
  IMAGE: 499989195637.dkr.ecr.us-east-1.amazonaws.com/flaskapp-simple-bank
  S3_BUCKET: s3://499989195637-devops-scripts

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: anujkumar-9/Banking-APP
          ref: main

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::499989195637:role/git-action-deploy-role
          aws-region: ${{ env.REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR }}

          echo "✅ Logged into Amazon ECR"

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ env.VERSION }} .

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE }}:${{ env.VERSION }}

      - name: Upload Docker Compose to S3
        run: |
          aws s3 mb ${{ env.S3_BUCKET }} --region ${{ env.REGION }} 2>/dev/null || true

          aws s3 cp docker_compose.yml \
            ${{ env.S3_BUCKET }}/docker-compose.yml \
            --region ${{ env.REGION }}

          echo "✅ docker-compose uploaded"

      - name: Deploy using SSM
        id: deploy
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ env.VERSION }} by ${{ github.actor }}" \
            --parameters '{
              "commands":[
                "set -e",
                "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 499989195637.dkr.ecr.us-east-1.amazonaws.com",
                "mkdir -p /home/ubuntu/app",
                "aws s3 cp s3://499989195637-devops-scripts/docker-compose.yml /home/ubuntu/app/docker-compose.yml",
                "docker pull 499989195637.dkr.ecr.us-east-1.amazonaws.com/flaskapp-simple-bank:v1.0.0",
                "docker stop simplebank 2>/dev/null || true",
                "docker rm simplebank 2>/dev/null || true",
                "cd /home/ubuntu/app && IMAGE_TAG=v1.0.0 docker compose up -d",
                "docker ps --filter name=simplebank --format \"{{.Status}}\" | grep -q Up && echo CONTAINER_RUNNING || (echo CONTAINER_FAILED && exit 1)"
              ]
            }' \
            --query "Command.CommandId" \
            --output text \
            --region ${{ env.REGION }})

          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"

      - name: Verify Deployment
        run: |
          for i in {1..12}; do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "${{ steps.deploy.outputs.cmd_id }}" \
              --query "CommandInvocations[*].Status" \
              --output text \
              --region ${{ env.REGION }})

            echo "Attempt $i : $STATUS"

            if echo "$STATUS" | grep -Eq "Pending|InProgress"; then
              sleep 10
            else
              break
            fi
          done

          aws ssm list-command-invocations \
            --command-id "${{ steps.deploy.outputs.cmd_id }}" \
            --details \
            --region ${{ env.REGION }} \
            --output table

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{ steps.deploy.outputs.cmd_id }}" \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region ${{ env.REGION }})

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::Deployment failed on $FAILED instance(s)."
            exit 1
          fi

          echo "✅ Deployment completed successfully"